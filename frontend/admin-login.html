<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Rudra Paithani Yeola</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    body { position: relative; }
  </style>
</head>
<body class="admin-login-page">
  <main class="admin-login-shell">
    <section class="admin-login-visual">
      <div class="admin-login-brand">
        <img src="images/logo.png" alt="Rudra Paithani Yeola Logo" class="admin-login-logo">
        <h1>Rudra Paithani Yeola</h1>
        <p>Admin Console</p>
      </div>
      <div class="admin-login-points">
        <div class="admin-login-point">Manage premium Paithani inventory and drops.</div>
        <div class="admin-login-point">Track orders and customer requests in one place.</div>
        <div class="admin-login-point">Keep artisan collections aligned with demand.</div>
      </div>
    </section>
    <section class="admin-login-card">
      <div class="admin-login-card-header">
        <h2>Admin Sign In</h2>
        <p>Secure access for store management only.</p>
      </div>
      <form id="admin-login-form">
        <label for="admin-username">Username</label>
        <input type="text" placeholder="Enter admin username" id="admin-username">
        <label for="admin-password">Password</label>
        <input type="password" placeholder="Enter admin password" id="admin-password">
        <button class="admin-login-btn" type="submit">Login</button>
      </form>
      <p class="admin-login-message" id="admin-login-message" role="alert" aria-live="polite"></p>
      <p class="admin-login-meta"><a class="admin-login-link" href="admin-forgot-password.html">Forgot password?</a></p>
      <p class="admin-login-meta">Need access? Contact the store owner.</p>
    </section>
  </main>

    <script src="js/api-config.js?v=20260405"></script>
<script src="js/script.js?v=20260405g"></script>
  <script src="js/admin-auth.js?v=20260405"></script>
  <script src="js/admin.js?v=20260405"></script>
    <script src="js/back-button.js"></script>
    <script src="js/whatsapp-chat.js"></script>
  <script>
    (function () {
      const form = document.getElementById('admin-login-form');
      if (!form || form.dataset.bound === '1') return;

      const setMessage = (text, type) => {
        const message = document.getElementById('admin-login-message');
        if (!message) return;
        message.textContent = text || '';
        message.classList.remove('success');
        message.classList.toggle('error', !type || type === 'error');
        if (type === 'success') message.classList.add('success');
      };

      const resolveApiBase = () => {
        if (typeof window.resolveAdminApiBase === 'function') {
          return window.resolveAdminApiBase();
        }
        if (window.ADMIN_API_BASE) return window.ADMIN_API_BASE;
        return 'http://localhost:5000';
      };

      form.addEventListener('submit', async function (event) {
        if (typeof adminLogin === 'function') return;
        event.preventDefault();

        const username = document.getElementById('admin-username')?.value?.trim() || '';
        const password = document.getElementById('admin-password')?.value || '';
        if (!username || !password) {
          setMessage('Please enter admin username and password.');
          return;
        }

        const apiBase = resolveApiBase();
        try {
          const res = await fetch(`${apiBase}/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            setMessage(data.error || 'Invalid credentials');
            return;
          }
          if (data.token) {
            sessionStorage.setItem('adminToken', data.token);
          }
          sessionStorage.setItem('adminSession', '1');
          setMessage('Login successful. Redirectingâ€¦', 'success');
          window.location.href = 'admin-dashboard.html';
        } catch (err) {
          setMessage('Unable to reach server. Please try again.');
        }
      });

      form.dataset.bound = '1';
    })();
  </script>
</body>
</html>
