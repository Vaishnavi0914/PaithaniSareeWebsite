<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Admin Password | Rudra Paithani Yeola</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body class="admin-login-page">
  <main class="admin-login-shell">
    <section class="admin-login-visual">
      <div class="admin-login-brand">
        <img src="images/logo.png" alt="Rudra Paithani Yeola Logo" class="admin-login-logo">
        <h1>Rudra Paithani Yeola</h1>
        <p>Admin Console</p>
      </div>
      <div class="admin-login-points">
        <div class="admin-login-point">Create a strong password for your admin account.</div>
        <div class="admin-login-point">Include letters, numbers, and special characters.</div>
        <div class="admin-login-point">Minimum 8 characters required.</div>
      </div>
    </section>
    <section class="admin-login-card">
      <div class="admin-login-card-header">
        <h2>Set New Password</h2>
        <p>Enter and confirm your new admin password.</p>
      </div>
      <form id="admin-reset-form">
        <label for="admin-reset-password">New Password</label>
        <input type="password" placeholder="New password" id="admin-reset-password">
        <label for="admin-reset-confirm">Confirm Password</label>
        <input type="password" placeholder="Confirm password" id="admin-reset-confirm">
        <button class="admin-login-btn" type="submit">Update Password</button>
      </form>
      <p class="admin-login-message" id="admin-reset-message" role="alert" aria-live="polite"></p>
      <p class="admin-login-meta"><a class="admin-login-link" href="admin-login.html">Back to login</a></p>
    </section>
  </main>

    <script src="js/runtime-config.js"></script>

    <script src="js/api-config.js?v=20260405"></script>
<script src="js/script.js?v=20260405g"></script>
  <script src="js/admin-auth.js?v=20260405"></script>
  <script src="js/admin.js?v=20260405"></script>
  <script src="js/back-button.js"></script>
  <script src="js/whatsapp-chat.js"></script>
</body>
</html>
