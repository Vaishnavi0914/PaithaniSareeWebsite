<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Password Reset | Rudra Paithani Yeola</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body class="admin-login-page">
  <main class="admin-login-shell">
    <section class="admin-login-visual">
      <div class="admin-login-brand">
        <img src="images/logo.png" alt="Rudra Paithani Yeola Logo" class="admin-login-logo">
        <h1>Rudra Paithani Yeola</h1>
        <p>Admin Console</p>
      </div>
      <div class="admin-login-points">
        <div class="admin-login-point">Reset access securely with a one-time link.</div>
        <div class="admin-login-point">Use the registered admin email to continue.</div>
        <div class="admin-login-point">Links expire after 1 hour for safety.</div>
      </div>
    </section>
    <section class="admin-login-card">
      <div class="admin-login-card-header">
        <h2>Forgot Password</h2>
        <p>Enter the admin email to receive a reset link.</p>
      </div>
      <form id="admin-forgot-form">
        <label for="admin-forgot-email">Admin Email</label>
        <input type="email" placeholder="admin@example.com" id="admin-forgot-email">
        <label for="admin-forgot-username">Admin Username (optional)</label>
        <input type="text" placeholder="Admin username" id="admin-forgot-username">
        <button class="admin-login-btn" type="submit">Send Reset Link</button>
      </form>
      <p class="admin-login-message" id="admin-forgot-message" role="alert" aria-live="polite"></p>
      <p class="admin-login-meta"><a class="admin-login-link" href="admin-login.html">Back to login</a></p>
    </section>
  </main>

    <script src="js/api-config.js?v=20260405"></script>
<script src="js/script.js?v=20260405g"></script>
  <script src="js/admin-auth.js?v=20260405"></script>
  <script src="js/admin.js?v=20260405"></script>
  <script src="js/back-button.js"></script>
  <script src="js/whatsapp-chat.js"></script>
</body>
</html>
