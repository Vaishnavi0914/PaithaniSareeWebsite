<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/style.css" />

<body>
  <div class="header-top">
    <p>Welcome to Admin Panel</p>
  </div>

  <header class="header-main" style="border-bottom: 3px solid var(--primary-maroon);">
    <div class="logo">
      <h1>Admin Dashboard</h1>
    </div>
    <nav>
      <ul>
        <li><a href="admin-dashboard.html">Overview</a></li>
        <li><a href="orders.html">Orders</a></li>

        <li><a href="index.html">Home</a></li>

  <main class="admin-main">
    <section class="admin-section">
      <div class="admin-section-header">
        <h2>Messages and Contact</h2>
        <p>View customer enquiries and send replies.</p>
      </div>
      <div class="admin-filters">
        <input id="message-search" class="admin-input" type="text" placeholder="Search by name, email, or message" />
        <select id="message-status-filter" class="admin-select">
          <option value="">All messages</option>
          <option value="open">Open</option>
          <option value="replied">Replied</option>
        </select>
        <button id="message-refresh" class="admin-inline-btn secondary" type="button">Refresh</button>
      </div>
      <div id="messages-root" class="admin-data">
        <p class="muted">Loading...</p>
      </div>
    </section>
  </main>

  <footer class="admin-footer" style="background: linear-gradient(to right, var(--primary-maroon), var(--header-top-bg)); color: white; text-align: center; padding: 20px; margin-top: 60px;">
